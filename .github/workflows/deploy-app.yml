name: Deploy web (real service) to Cloudflare Pages

# Real-service frontend. Separate Cloudflare Pages project (fincoach-app) from
# the demo (deploy-web.yml -> fincoach). Built with VITE_API_BASE pointing at
# the live backend so the React app talks to Render instead of falling back to
# demo data. The backend URL is a repo Variable (APP_API_BASE) so it can change
# without editing code: Settings -> Secrets and variables -> Actions -> Variables.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-app.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install
        working-directory: web
        run: npm ci

      - name: Build (points at live backend + Supabase auth)
        working-directory: web
        env:
          VITE_API_BASE: ${{ vars.APP_API_BASE }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      # pages-action does not create projects; create it once via the API.
      # Idempotent: a name-already-exists 4xx is fine. Token is never printed.
      - name: Ensure Pages project exists
        env:
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          code=$(curl -s -o /tmp/cf.json -w "%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"name":"fincoach-app","production_branch":"main"}')
          echo "create-project HTTP $code"
          sed -E 's/"(id|jwt|subdomain)":"[^"]*"/"\1":"***"/g' /tmp/cf.json || true
          # Do not fail on 409/4xx (already exists); publish step is the gate.

      - name: Publish to Cloudflare Pages (fincoach-app)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: fincoach-app
          directory: web/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
